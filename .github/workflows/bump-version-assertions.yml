name: Bump version assertions

on:
  push:
    branches:
      - fix/player-sprite-v01069

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/player-sprite-v01069

      - name: Update assertions
        run: node scripts/bump-version-assertions.mjs

      - name: Commit updated assertions
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: test: update version assertions to 0.10.69
          file_pattern: scripts/*.mjs
