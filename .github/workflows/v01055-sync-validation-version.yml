name: Sync v0.10.55 validation versions

on:
  push:
    branches:
      - codex/v01055-poison-chain-control-fix

permissions:
  contents: write

jobs:
  sync-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/v01055-poison-chain-control-fix
          fetch-depth: 0
      - name: Update validation and detail expectations
        run: |
          grep -rl --include='*.mjs' '0.10.54' scripts | xargs -r sed -i 's/0\.10\.54/0.10.55/g'
          sed -i "s/tags.includes('active_skill')/tags.includes('activeSkill')/" scripts/validate-01055-poison-chain-control-fix.mjs
          if ! grep -q 'setAlpha(){ return this; }' scripts/validate-01055-poison-chain-control-fix.mjs; then
            sed -i '/setDepth(){ return this; },/a\  setAlpha(){ return this; },' scripts/validate-01055-poison-chain-control-fix.mjs
          fi
          sed -i 's/自动向中毒敌人投出毒链，造成伤害并禁锢普通或精英敌人2秒；Boss只受伤害。随后以目标为节点扩张毒网。/自动向中毒敌人投出毒链，命中后结算一次毒系直接攻击并禁锢普通或精英敌人2秒；Boss只承受直接攻击。随后以目标为节点扩张毒网。/' src/skills/handlers/PoisonSummonInteractionFixes.js
      - name: Commit updates
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts src/skills/handlers/PoisonSummonInteractionFixes.js
          git commit -m 'Fix v0.10.55 detail validation'
          git push origin HEAD:codex/v01055-poison-chain-control-fix
