name: Prepare version assertions

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update assertions in workspace
        run: node scripts/bump-version-assertions.mjs

      - name: Upload updated scripts
        uses: actions/upload-artifact@v4
        with:
          name: updated-version-scripts
          path: scripts
