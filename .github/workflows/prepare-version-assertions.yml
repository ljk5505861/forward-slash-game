name: Prepare version assertions

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/player-sprite-v01069

      - name: Update assertions
        run: node scripts/bump-version-assertions.mjs

      - name: Commit assertion updates
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/*.mjs
          git diff --cached --quiet && exit 0
          git commit -m "test: update version assertions to 0.10.69"
          git push origin HEAD:fix/player-sprite-v01069
