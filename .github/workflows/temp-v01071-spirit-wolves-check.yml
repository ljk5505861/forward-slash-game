name: Temporary v0.10.71 Spirit Wolves Check

on:
  push:
    branches:
      - codex-ablumn

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run validate:01071-spirit-wolves
      - run: npm run validate:01070-player-image
      - name: Run every validate script
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const pkg = require('./package.json');
          const scripts = Object.keys(pkg.scripts || {}).filter((name) => name.startsWith('validate:')).sort();
          for (const name of scripts) {
            console.log(`\n=== npm run ${name} ===`);
            execFileSync('npm', ['run', name], { stdio: 'inherit' });
          }
          console.log(`\nAll ${scripts.length} validate scripts passed.`);
          NODE
