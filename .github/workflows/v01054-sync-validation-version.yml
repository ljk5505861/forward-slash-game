name: Sync v0.10.54 validation versions

on:
  push:
    branches:
      - codex/v01054-poison-stacks-gu-fix

permissions:
  contents: write

jobs:
  sync-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/v01054-poison-stacks-gu-fix
          fetch-depth: 0
      - name: Update validation version literals
        run: |
          grep -rl --include='*.mjs' '0.10.53' scripts | xargs -r sed -i 's/0\.10\.53/0.10.54/g'
      - name: Commit validation updates
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts
          git commit -m 'Update validation versions for v0.10.54'
          git push origin HEAD:codex/v01054-poison-stacks-gu-fix
