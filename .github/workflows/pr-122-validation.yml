name: PR 122 validation

on:
  push:
    branches:
      - codex-j3eqdc
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm run validate:01053-poison-summon-rework
      - run: npm run validate:010-gameplay-loop
      - run: npm run validate:enemy-population
      - run: npm run validate:01046-skill-detail-ui
