name: Validate player sprite temporary

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/player-idle-sprite

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Run validation scripts
        shell: bash
        run: |
          status=0
          : > validation.log
          node --input-type=module <<'NODE' 2>&1 | tee validation.log || status=1
          import { execFileSync } from 'node:child_process';
          import packageJson from './package.json' with { type: 'json' };

          let failed = false;
          for (const name of Object.keys(packageJson.scripts).filter((key) => key.startsWith('validate:'))) {
            console.log(`\n=== npm run ${name} ===`);
            try {
              execFileSync('npm', ['run', name], { stdio: 'inherit' });
            } catch {
              failed = true;
              console.error(`FAILED_SCRIPT=${name}`);
            }
          }
          if (failed) process.exit(1);
          NODE
          exit $status
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-validation-log
          path: validation.log
