name: Temporary v0.10.65 version sync and validation

on:
  push:
    branches:
      - 'fix/0.10.65-myriad-standalone'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/0.10.65-myriad-standalone
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync validation version assertions
        run: |
          grep -rl "0.10.64" scripts | xargs -r sed -i "s/0\.10\.64/0.10.65/g"
      - name: Commit synced validation versions
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts
          git diff --cached --quiet || git commit -m "test: sync validations for v0.10.65"
          git push origin HEAD:fix/0.10.65-myriad-standalone
      - run: npm install --silent
      - run: npm run build --silent
      - name: Run all validation scripts
        run: |
          node - <<'NODE'
          const { spawnSync } = require('node:child_process');
          const scripts = require('./package.json').scripts;
          for (const name of Object.keys(scripts).filter(name => name.startsWith('validate:'))) {
            const result = spawnSync('npm', ['run', name], { encoding: 'utf8' });
            if (result.status !== 0) {
              console.error(`FAILED ${name}`);
              console.error(result.stdout || '');
              console.error(result.stderr || '');
              process.exit(result.status || 1);
            }
            console.log(`PASS ${name}`);
          }
          console.log('ALL_VALIDATIONS_PASSED');
          NODE
