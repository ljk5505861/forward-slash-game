name: Temporary v0.10.65 version sync and validation

on:
  push:
    branches:
      - 'fix/0.10.65-myriad-standalone'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/0.10.65-myriad-standalone
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync validation version assertions
        run: |
          grep -rl "0.10.64" scripts | xargs -r sed -i "s/0\.10\.64/0.10.65/g"
      - run: npm install
      - run: npm run validate:01064-afterimage-rework
