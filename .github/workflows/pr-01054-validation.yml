name: PR v0.10.54 validation

on:
  push:
    branches:
      - codex/v01054-poison-stacks-gu-fix
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - name: Run all validation scripts
        run: |
          for script in $(node -e "const p=require('./package.json'); console.log(Object.keys(p.scripts).filter(k=>k.startsWith('validate:')).join(' '))"); do
            npm run "$script" || exit 1
          done
