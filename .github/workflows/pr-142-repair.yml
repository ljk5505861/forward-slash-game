name: Repair and validate PR 142

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  repair-and-validate:
    if: github.head_ref == 'fix/v0.10.70-player-png'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update stale version assertions and add image regression
        shell: bash
        run: |
          grep -rlZ "0.10.69" scripts --include='*.mjs' | xargs -0 -r sed -i 's/0\.10\.69/0.10.70/g'

          cat > scripts/validate-01070-player-image.mjs <<'EOF'
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';
          import { GAME_VERSION } from '../src/config/version.js';

          assert.equal(GAME_VERSION, '0.10.70');
          const png = readFileSync(new URL('../src/player_idle.png', import.meta.url));
          assert.deepEqual([...png.subarray(0, 8)], [137, 80, 78, 71, 13, 10, 26, 10]);
          assert.equal(png.toString('ascii', 12, 16), 'IHDR');
          assert.equal(png.readUInt32BE(16), 127);
          assert.equal(png.readUInt32BE(20), 176);
          assert.equal(png[25], 6);
          console.log('v0.10.70 player image validation passed.');
          EOF

          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const packageJson = JSON.parse(readFileSync('package.json', 'utf8'));
          packageJson.scripts['validate:01070-player-image'] = 'node scripts/validate-01070-player-image.mjs';
          writeFileSync('package.json', `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run all validation scripts
        id: validations
        continue-on-error: true
        shell: bash
        run: |
          node --input-type=module > validation-results.txt 2>&1 <<'NODE'
          import { readFileSync } from 'node:fs';
          import { spawnSync } from 'node:child_process';
          const packageJson = JSON.parse(readFileSync('package.json', 'utf8'));
          const validations = Object.keys(packageJson.scripts)
            .filter((name) => name.startsWith('validate:'))
            .sort();
          for (const name of validations) {
            const result = spawnSync('npm', ['run', name], { encoding: 'utf8', env: process.env });
            if (result.status !== 0) {
              console.error(`FAILED: ${name}`);
              if (result.stdout) console.error(result.stdout);
              if (result.stderr) console.error(result.stderr);
              process.exit(result.status ?? 1);
            }
            console.log(`PASS: ${name}`);
          }
          NODE

      - name: Commit repaired validation files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json scripts
          if git diff --cached --quiet; then
            echo "No repair commit needed."
          else
            git commit -m "test: validate repaired player image"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-142-validation-results
          path: validation-results.txt

      - name: Fail when validation failed
        if: steps.validations.outcome == 'failure'
        shell: bash
        run: |
          cat validation-results.txt
          exit 1
