name: Deploy to GitHub Pages

on:
  push:
    branches: [main, fix/player-sprite-v01069]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bump-version-assertions:
    if: github.ref == 'refs/heads/fix/player-sprite-v01069'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/player-sprite-v01069

      - name: Update assertions
        run: node scripts/bump-version-assertions.mjs

      - name: Commit updated assertions
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: test: update version assertions to 0.10.69
          file_pattern: scripts/*.mjs

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
