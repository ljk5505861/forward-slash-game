name: Temporary afterimage validation

on:
  push:
    branches:
      - 'codex/-v0.10.64'
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Run isolated validation
        run: |
          git clone --quiet --depth 1 --branch 'codex/-v0.10.64' https://github.com/ljk5505861/forward-slash-game.git repo
          cd repo
          npm install --silent
          npm run validate:01064-afterimage-rework
