name: Temporary afterimage validation

on:
  push:
    branches:
      - 'codex/-v0.10.64'
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run validate:01064-afterimage-rework
