name: Export validation scripts

on:
  push:
    branches:
      - feat/player-idle-sprite

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Export updated assertions
        run: node scripts/export-version-assertions.mjs 0.10.67 0.10.68
      - name: Upload scripts
        uses: actions/upload-artifact@v4
        with:
          name: version-assertions
          path: version-assertions
