name: Superhero Runtime Debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Run isolated runtime validation
        shell: bash
        run: |
          git clone --quiet --depth 1 --branch codex-cla3dt https://github.com/ljk5505861/forward-slash-game.git repo
          cd repo
          npm ci --silent
          node scripts/validate-01098-superhero-runtime.mjs
