name: Apply v0.10.55 poison damage color

on:
  push:
    branches:
      - codex/v01055-poison-chain-control-fix

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/v01055-poison-chain-control-fix
          fetch-depth: 0
      - name: Make poison damage readable
        run: |
          python - <<'PY'
          from pathlib import Path

          combat = Path('src/systems/CombatSystem.js')
          text = combat.read_text()
          old = "meta.source==='burn'?'#ff8a33':'#fff'"
          new = "meta.source==='burn'?'#ff8a33':meta.source==='poison'?'#63ff72':'#fff'"
          if old not in text:
              raise SystemExit('damage color expression not found')
          combat.write_text(text.replace(old, new, 1))

          validation = Path('scripts/validate-01055-poison-chain-control-fix.mjs')
          text = validation.read_text()
          marker = "const interactionSource=fs.readFileSync("
          assertion = "const combatSource=fs.readFileSync(new URL('../src/systems/CombatSystem.js',import.meta.url),'utf8');\nassert.match(combatSource,/meta\\.source===['\"]poison['\"]\\?['\"]#63ff72['\"]/, 'poison damage numbers use bright green');\n\n"
          if assertion not in text:
              text = text.replace(marker, assertion + marker)
          validation.write_text(text)
          PY
      - name: Commit poison damage color
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/systems/CombatSystem.js scripts/validate-01055-poison-chain-control-fix.mjs
          git commit -m 'Show poison damage numbers in green'
          git push origin HEAD:codex/v01055-poison-chain-control-fix
