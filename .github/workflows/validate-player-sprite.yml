name: Validate player sprite

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Refresh version-only assertions
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const directory = path.resolve('scripts');
          for (const name of fs.readdirSync(directory)) {
            if (!name.endsWith('.mjs')) continue;
            const file = path.join(directory, name);
            const source = fs.readFileSync(file, 'utf8');
            if (!source.includes('0.10.67')) continue;
            fs.writeFileSync(file, source.replaceAll('0.10.67', '0.10.68'));
          }
          NODE

      - name: Upload refreshed validation scripts
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-validation-scripts
          path: scripts

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run all validation scripts
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import packageJson from './package.json' with { type: 'json' };

          for (const name of Object.keys(packageJson.scripts).filter((key) => key.startsWith('validate:'))) {
            console.log(`\n=== npm run ${name} ===`);
            execFileSync('npm', ['run', name], { stdio: 'inherit' });
          }
          NODE

# Trigger branch automation after workflow creation.
