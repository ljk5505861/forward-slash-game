name: Diagnose v0.10.54 skill regression

on:
  push:
    branches:
      - codex/v01054-poison-stacks-gu-fix
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Capture validation output
        run: |
          set +e
          npm run validate:01040-skill-damage > validation-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> validation-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: validation-output.txt
