name: PR 125 v0.10.56 validation

on:
  push:
    branches:
      - codex/v01056-open-skill-pool
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm run validate:01056-open-skill-pool
      - run: npm run validate:reward-bias
      - run: npm run validate:selection-ui
      - run: npm run validate:gameplay-entry
