name: Apply version assertions

on:
  push:
    branches:
      - feat/player-idle-sprite

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message != 'test: update version assertions to 0.10.68'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/player-idle-sprite

      - name: Refresh version-only assertions
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';

          const directory = path.resolve('scripts');
          for (const name of fs.readdirSync(directory)) {
            if (!name.endsWith('.mjs')) continue;
            const file = path.join(directory, name);
            const source = fs.readFileSync(file, 'utf8');
            if (!source.includes('0.10.67')) continue;
            fs.writeFileSync(file, source.replaceAll('0.10.67', '0.10.68'));
          }
          NODE

      - name: Commit refreshed assertions
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: test: update version assertions to 0.10.68
          branch: feat/player-idle-sprite
          file_pattern: scripts/*.mjs
