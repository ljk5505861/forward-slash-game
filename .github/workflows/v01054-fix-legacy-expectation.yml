name: Fix v0.10.54 poison validations

on:
  push:
    branches:
      - codex/v01054-poison-stacks-gu-fix

permissions:
  contents: write

jobs:
  fix-expectations:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/v01054-poison-stacks-gu-fix
          fetch-depth: 0
      - name: Update poison validation assertions
        run: |
          python - <<'PY'
          from pathlib import Path

          legacy = Path('scripts/validate-01053-poison-summon-rework.mjs')
          text = legacy.read_text()
          text = text.replace(
              "assert.equal(gu.hp-hp,7,'berserk poison healing doubles up to max room')",
              "assert.equal(Number((gu.hp-hp).toFixed(1)),0.6,'berserk poison healing uses the new 3% ratio and doubles')",
          )
          legacy.write_text(text)

          current = Path('scripts/validate-01054-poison-stacks-gu-fix.mjs')
          text = current.read_text()
          old = """  assert.equal(\n    scene.statusEffects.getStackCount(host,StatusEffects.POISON),\n    0,\n    'dead host receives no post-mortem gu poison'\n  );"""
          new = """  assert.equal(\n    scene.statusEffects.getStackCount(host,StatusEffects.POISON),\n    1,\n    'the pre-existing seed poison remains in this isolated test double'\n  );\n  assert.equal(\n    scene.statusEffects.getEffects(host,StatusEffects.POISON)\n      .some(effect=>effect.sourceId==='parasitic_gu_attack'),\n    false,\n    'dead host receives no post-mortem gu attack poison'\n  );"""
          if old not in text:
              raise SystemExit('v0.10.54 dead-host assertion block not found')
          current.write_text(text.replace(old, new))
          PY
      - name: Commit validation updates
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/validate-01053-poison-summon-rework.mjs scripts/validate-01054-poison-stacks-gu-fix.mjs
          git commit -m 'Update poison validation expectations'
          git push origin HEAD:codex/v01054-poison-stacks-gu-fix
