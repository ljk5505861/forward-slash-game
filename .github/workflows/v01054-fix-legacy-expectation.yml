name: Fix v0.10.54 legacy poison expectation

on:
  push:
    branches:
      - codex/v01054-poison-stacks-gu-fix

permissions:
  contents: write

jobs:
  fix-expectation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/v01054-poison-stacks-gu-fix
          fetch-depth: 0
      - name: Update old parasitic gu healing assertion
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/validate-01053-poison-summon-rework.mjs')
          text = path.read_text()
          old = "assert.equal(gu.hp-hp,7,'berserk poison healing doubles up to max room')"
          new = "assert.equal(Number((gu.hp-hp).toFixed(1)),0.6,'berserk poison healing uses the new 3% ratio and doubles')"
          if old not in text:
              raise SystemExit('expected legacy assertion not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Commit assertion update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/validate-01053-poison-summon-rework.mjs
          git commit -m 'Update parasitic gu healing regression'
          git push origin HEAD:codex/v01054-poison-stacks-gu-fix
