name: v0.11.0 Version Assertion Sync

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex-v01100-superhero-kinetic
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Synchronize version assertions
        run: node scripts/sync-v01100-version-assertions.mjs
      - name: Commit synchronized assertions
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json scripts
          git commit -m "Synchronize v0.11.0 validation assertions"
          git push origin HEAD:codex-v01100-superhero-kinetic
