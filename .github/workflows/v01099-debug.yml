name: v0.10.99 Regression Debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Capture full regression output
        shell: bash
        run: |
          set +e
          npm run validate:01099-playtest-fixes > v01099.log 2>&1
          printf '%s\n' "$?" > v01099.status
          exit 0
      - name: Upload regression log
        uses: actions/upload-artifact@v4
        with:
          name: v01099-regression-log
          path: |
            v01099.log
            v01099.status
